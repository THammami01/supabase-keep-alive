name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ping Supabase projects
        run: node scripts/ping.mjs
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
